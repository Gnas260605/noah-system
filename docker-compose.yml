##############################################################################
#  NOAH Retail Integration System – Docker Compose
#  Services: mysql · postgres · rabbitmq · kong-db · kong · api · worker · producer · legacy
##############################################################################

services:

  # ── RabbitMQ Message Broker ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: noah-rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI  → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Ho_Chi_Minh
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  # ── MySQL – E-Commerce Database ───────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: noah-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3307:3306"
    volumes:
      - ./db/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent" ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # ── PostgreSQL – Finance Database ─────────────────────────────────────────
  postgres:
    image: postgres:14
    container_name: noah-postgres
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: finance
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - ./db/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d finance" ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # ── Noah API (Flask + Gunicorn) ───────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: noah-api
    # ports:
    #   - "5000:5000"   # ĐÃ ẨN – Chỉ truy cập qua Kong :8000 (Module 4 Security)
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_QUEUE: orders
      RABBITMQ_API_URL: http://rabbitmq:15672/api
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      POSTGRES_HOST: postgres
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      ENVIRONMENT: docker
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./api:/app/api
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml
      - ./worker:/app/worker
      - noah_data:/app/data # SQLite persistence
      - ./legacy/inventory.csv:/app/legacy/inventory.csv # Historical CSV
      - ./db/init.sql:/app/db/init.sql # Historical SQL
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  # ── Worker (RabbitMQ Consumer) ────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: noah-worker
    environment:
      RABBITMQ_HOST: rabbitmq
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      POSTGRES_HOST: postgres
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      ENVIRONMENT: docker
      TZ: Asia/Ho_Chi_Minh
      # ── Module 3: Notification System (Email) ─────────────────
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: sang28097@gmail.com
      SMTP_PASSWORD: "cvhz wxcg gnzz jggy"
      NOTIFY_TO: sang28097@gmail.com
      NOTIFICATIONS_ENABLED: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  # ── Producer (Continuous Order Generator) ────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: noah-producer
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_QUEUE: orders
      SEND_INTERVAL: "1.0"
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: "no"

  # ── Legacy Adapter – Polling Daemon (Module 1) ─────────────────────
  legacy:
    build:
      context: ./legacy
      dockerfile: Dockerfile
    container_name: noah-legacy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      INPUT_DIR: /app/input
      PROCESSED_DIR: /app/processed
      POLL_INTERVAL: "10"
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./legacy:/app                      # Code + input + processed cùng mount
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped               # Tự động restart nếu chết

  # ── Auto-Healer (Module 2: Messaging & Consistency) ──────────────────────
  auto_healer:
    build:
      context: ./worker
      dockerfile: Dockerfile.healer
    container_name: noah-auto-healer
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      POSTGRES_HOST: postgres
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      HEAL_INTERVAL_SECONDS: "60" # chạy heal mỗi 60 giây
      HEAL_BATCH_LIMIT: "500" # tối đa 500 bản ghi mỗi chu kỳ
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  # ── Module 4: Kong API Gateway (DB-less mode) ────────────────────────
  kong:
    image: kong:3.6
    container_name: noah-kong
    environment:
      KONG_DATABASE:           "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG:   /dev/stdout
      KONG_ADMIN_ACCESS_LOG:   /dev/stdout
      KONG_PROXY_ERROR_LOG:    /dev/stderr
      KONG_ADMIN_ERROR_LOG:    /dev/stderr
      KONG_ADMIN_LISTEN:       0.0.0.0:8001
      KONG_PROXY_LISTEN:       0.0.0.0:8000
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "8000:8000"   # Proxy → gửi request qua đây
      - "8001:8001"   # Admin API
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

##############################################################################
volumes:
  mysql_data:
  postgres_data:
  noah_data:
